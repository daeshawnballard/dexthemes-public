<!-- Prevent theme flash: apply saved theme CSS vars before first paint -->
<script>
(function(){
  try {
    var tid = localStorage.getItem('dexthemes-selected');
    var v = localStorage.getItem('dexthemes-variant') || 'dark';
    var cache = localStorage.getItem('dexthemes-theme-cache');
    if (tid && cache) {
      var t = JSON.parse(cache);
      if (t && t[v]) {
        var d = t[v], r = document.documentElement.style;
        var dark = v === 'dark';
        r.setProperty('--bg', d.surface);
        r.setProperty('--sidebar-bg', d.sidebar);
        r.setProperty('--text-primary', d.ink);
        r.setProperty('--accent', d.accent || t.accents && t.accents[0] || '#0169cc');
        r.setProperty('--border', dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)');
        r.setProperty('--border-strong', dark ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.14)');
        r.setProperty('--text-muted', dark ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)');
      }
    }
  } catch(e){}
})();
</script>

<script>
(function () {
  const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const host = window.location.hostname;
  const constrained = connection?.saveData || /^(slow-2g|2g|3g)$/.test(connection?.effectiveType || "");
  if (host === "localhost" || host === "127.0.0.1") return;
  if (constrained) return;
  if (window.innerWidth <= 1024) return;

  let telemetryScheduled = false;
  const loadTelemetry = () => {
    if (telemetryScheduled) return;
    telemetryScheduled = true;
    ["/_vercel/insights/script.js", "/_vercel/speed-insights/script.js"].forEach((src) => {
      if (document.querySelector('script[data-telemetry="' + src + '"]')) return;
      const script = document.createElement("script");
      script.src = src;
      script.defer = true;
      script.dataset.telemetry = src;
      document.body.appendChild(script);
    });
  };

  const scheduleTelemetry = () => {
    if ("requestIdleCallback" in window) {
      requestIdleCallback(loadTelemetry, { timeout: 8000 });
      return;
    }
    setTimeout(loadTelemetry, 4000);
  };

  const onFirstIntent = () => {
    window.removeEventListener("pointerdown", onFirstIntent);
    window.removeEventListener("keydown", onFirstIntent);
    scheduleTelemetry();
  };

  window.addEventListener("pointerdown", onFirstIntent, { once: true, passive: true });
  window.addEventListener("keydown", onFirstIntent, { once: true });
  window.addEventListener("load", () => {
    setTimeout(() => {
      if (!telemetryScheduled && document.visibilityState === "visible") {
        scheduleTelemetry();
      }
    }, 12000);
  }, { once: true });
})();
</script>
