<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #111; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; justify-content: center; }
  .logo-card { text-align: center; }
  .logo-card img { width: 128px; height: 128px; }
  .logo-card .small { width: 32px; height: 32px; margin-top: 12px; }
  .logo-card .tiny { width: 16px; height: 16px; margin-top: 8px; }
  .logo-card p { margin-top: 12px; font-size: 14px; color: #888; }
  h1 { width: 100%; text-align: center; font-size: 24px; margin-bottom: 20px; }
</style>
</head>
<body>
  <h1>DexThemes — Logo Concepts</h1>
  <div class="logo-card">
    <img src="../logo.svg"><br>
    <img class="small" src="../logo.svg">
    <img class="tiny" src="../logo.svg">
    <p>Current active mark</p>
  </div>
  <div class="logo-card">
    <img src="final-candidate-offset-swatches.svg"><br>
    <img class="small" src="final-candidate-offset-swatches.svg">
    <img class="tiny" src="final-candidate-offset-swatches.svg">
    <p>A. Offset swatches</p>
  </div>
  <div class="logo-card">
    <img src="final-candidate-ribbon-d.svg"><br>
    <img class="small" src="final-candidate-ribbon-d.svg">
    <img class="tiny" src="final-candidate-ribbon-d.svg">
    <p>B. Ribbon gesture</p>
  </div>
  <div class="logo-card">
    <img src="final-candidate-commit-d.svg"><br>
    <img class="small" src="final-candidate-commit-d.svg">
    <img class="tiny" src="final-candidate-commit-d.svg">
    <p>C. Commit graph D</p>
  </div>
  <div class="logo-card">
    <img src="final-candidate-commit-carved-d.svg"><br>
    <img class="small" src="final-candidate-commit-carved-d.svg">
    <img class="tiny" src="final-candidate-commit-carved-d.svg">
    <p>D. Commit-carved D</p>
  </div>
</body>
</html>
